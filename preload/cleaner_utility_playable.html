<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8"><title>Playable</title>
    <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
    <script type="text/javascript">

      window.templateConfig = {
        template: 'UN_AL',
      }

      window.onload = function() {

        window.checkIOS()

        const isMraid = typeof mraid !== 'undefined'

        function isReady() {
            if (mraid.isViewable()) {
              window.initPlayable();
            } else {
                mraid.addEventListener('viewableChange', function(viewable) {
                  if (viewable) {
                    mraid.removeEventListener('viewableChange', arguments.callee)
                    window.initPlayable();
                  }
                });
            }
        }

        if (isMraid) {
            if (mraid.getState() == 'loading') {
                mraid.addEventListener('ready', isReady)
            } else {
                isReady();
            }

            mraid.addEventListener('audioVolumeChange', function(volume) {
              if (! volume || volume < 5) {
                window.dispatchEvent(new CustomEvent('SoundOff'));
              }
              else {
                window.dispatchEvent(new CustomEvent('SoundOn'));
              }
            })
        } else {
          window.initPlayable();
        }


        window.clickInstall = function() {
          var link;
          if (window.isIOS) {
              link = window.linkIOS
          } else {
              link = window.linkAndroid
          }

          if (isMraid) {
              mraid.open(link)
          } else {
              window.open(link, '_blank')
          }
        }
      }
    </script>
    <style>
      html,
      body {
        margin: 0;
        width: 100%;
        height: 100%;
        background-color: #000000;
        overflow: hidden;
        user-select: none;
        position: relative;
      }
      #game-container {
        width: 100%;
        height: 100%;
        position: absolute;
        left: 0;
        top: 0;
      }
      canvas {
        display: block;
      }
    </style>
  </head>
  <body>
    <div id="game-container"></div>

    <script>
      window.linkIOS = 'https://apps.apple.com/us/app/keepclean-ai-storage-cleaner/id6752901737';
      window.linkAndroid = 'https://apps.apple.com/us/app/keepclean-ai-storage-cleaner/id6752901737';
      window.isIOS = false;

      window.checkIOS = function() {
        window.isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent) ||
          (navigator.platform === 'MacIntel' && navigator.maxTouchPoints > 1);
      }
    </script>

    <script src="https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser.min.js"></script>

    <script>
    window.initPlayable = function() {

      var W, H;
      var ITEM_TYPES = [
        { label: 'Cache',    emoji: '🗑️', gb: 12, color: 0xff6b6b },
        { label: 'Temp',     emoji: '📄', gb: 8,  color: 0xffa94d },
        { label: 'Junk',     emoji: '📦', gb: 15, color: 0xcc5de8 },
        { label: 'Logs',     emoji: '📋', gb: 6,  color: 0x74c0fc },
        { label: 'Dupes',    emoji: '📑', gb: 11, color: 0x69db7c },
        { label: 'Old APK',  emoji: '⚙️', gb: 14, color: 0xffd43b },
        { label: 'Residual', emoji: '🧹', gb: 9,  color: 0xe599f7 },
        { label: 'Ads Data', emoji: '📢', gb: 10, color: 0xff8787 }
      ];
      var MAX_GB = 100;
      var ITEMS_TO_COLLECT = 10;

      /* ==============================
         BOOT SCENE
         ============================== */
      class BootScene extends Phaser.Scene {
        constructor() { super('Boot'); }

        create() {
          W = this.scale.width;
          H = this.scale.height;
          this.generateTextures();
          this.scene.start('Game');
        }

        generateTextures() {
          // Junk item textures (large)
          for (var i = 0; i < ITEM_TYPES.length; i++) {
            var it = ITEM_TYPES[i];
            var ig = this.make.graphics({ x: 0, y: 0, add: false });
            var iw = 82, ih = 82;
            ig.fillStyle(it.color, 1);
            ig.fillRoundedRect(2, 2, iw - 4, ih - 4, 14);
            ig.fillStyle(0xffffff, 0.2);
            ig.fillRoundedRect(5, 5, iw - 10, ih / 2 - 5, { tl: 12, tr: 12, bl: 0, br: 0 });
            ig.lineStyle(2, 0xffffff, 0.35);
            ig.strokeRoundedRect(2, 2, iw - 4, ih - 4, 14);
            ig.generateTexture('item_' + i, iw, ih);
            ig.destroy();
          }

          // Fire particle
          var pg = this.make.graphics({ x: 0, y: 0, add: false });
          pg.fillStyle(0xffffff, 1);
          pg.fillCircle(8, 8, 8);
          pg.generateTexture('fire_particle', 16, 16);
          pg.destroy();

          // Spark particle
          var sg = this.make.graphics({ x: 0, y: 0, add: false });
          sg.fillStyle(0xffffff, 1);
          sg.fillCircle(4, 4, 4);
          sg.generateTexture('spark', 8, 8);
          sg.destroy();

          // Button texture
          var bg = this.make.graphics({ x: 0, y: 0, add: false });
          var btnW = 260, btnH = 70;
          bg.fillStyle(0x00c853, 1);
          bg.fillRoundedRect(0, 4, btnW, btnH - 4, 16);
          bg.fillStyle(0x00e676, 1);
          bg.fillRoundedRect(0, 0, btnW, btnH - 8, 16);
          bg.lineStyle(3, 0xffffff, 0.3);
          bg.strokeRoundedRect(0, 0, btnW, btnH - 4, 16);
          bg.generateTexture('cta_btn', btnW, btnH);
          bg.destroy();

          // Hand pointer for tutorial
          var hg = this.make.graphics({ x: 0, y: 0, add: false });
          hg.fillStyle(0xffffff, 0.9);
          hg.fillCircle(20, 20, 18);
          hg.fillStyle(0xffffff, 0.9);
          hg.fillRoundedRect(12, 20, 16, 24, 6);
          hg.lineStyle(2, 0x000000, 0.2);
          hg.strokeCircle(20, 20, 18);
          hg.generateTexture('hand', 40, 50);
          hg.destroy();
        }
      }

      /* ==============================
         GAME SCENE
         ============================== */
      class GameScene extends Phaser.Scene {
        constructor() { super('Game'); }

        create() {
          this.collected = 0;
          this.gbRemoved = 0;
          this.gameOver = false;
          this.itemsOnScreen = [];
          this.pointerX = W / 2;

          // Background
          this.bgColor = { r: 200, g: 30, b: 30 };
          this.cameras.main.setBackgroundColor('#c81e1e');

          // Vignette overlay
          this.createVignette();

          // Fire emitters on edges
          this.createFireParticles();

          // Warning text at top
          this.warningBg = this.add.rectangle(W / 2, 55, W - 30, 50, 0x000000, 0.5);
          this.warningBg.setScrollFactor(0).setDepth(10);

          this.warningIcon = this.add.text(25, 42, '⚠️', {
            fontSize: '26px'
          }).setDepth(11);

          this.warningText = this.add.text(55, 40, 'Phone is full! Clean now!', {
            fontFamily: 'Arial, Helvetica, sans-serif',
            fontSize: '16px',
            fontStyle: 'bold',
            color: '#ff4444',
            stroke: '#000000',
            strokeThickness: 1
          }).setDepth(11);

          // GB counter
          this.gbBg = this.add.rectangle(W / 2, 115, 200, 60, 0x000000, 0.6);
          this.gbBg.setScrollFactor(0).setDepth(10);
          this.gbBg.setStrokeStyle(2, 0xff4444, 0.8);

          this.gbText = this.add.text(W / 2, 105, MAX_GB + ' GB', {
            fontFamily: 'Arial, Helvetica, sans-serif',
            fontSize: '36px',
            fontStyle: 'bold',
            color: '#ffffff',
            stroke: '#000000',
            strokeThickness: 3
          }).setOrigin(0.5).setDepth(11);

          this.gbLabel = this.add.text(W / 2, 132, 'JUNK FILES', {
            fontFamily: 'Arial, Helvetica, sans-serif',
            fontSize: '12px',
            fontStyle: 'bold',
            color: '#ff8888',
            letterSpacing: 4
          }).setOrigin(0.5).setDepth(11);

          // Storage bar (starts full, decreases as junk is removed)
          this.storageBarWidth = W - 40;
          this.progressBg = this.add.rectangle(W / 2, 160, this.storageBarWidth, 20, 0x222222, 0.85);
          this.progressBg.setStrokeStyle(2, 0x555555, 0.6).setDepth(10);
          this.progressFill = this.add.rectangle(20, 160, this.storageBarWidth, 18, 0xff4444, 1);
          this.progressFill.setOrigin(0, 0.5).setDepth(11);

          this.storageLabel = this.add.text(W / 2, 160, MAX_GB + ' GB / ' + MAX_GB + ' GB', {
            fontFamily: 'Arial, Helvetica, sans-serif',
            fontSize: '11px',
            fontStyle: 'bold',
            color: '#ffffff',
            stroke: '#000000',
            strokeThickness: 2
          }).setOrigin(0.5).setDepth(12);

          // Basket (emoji)
          this.basket = this.add.text(W / 2, H - 100, '🗑️', {
            fontSize: '64px'
          }).setOrigin(0.5).setDepth(20);

          // Glow under basket
          this.basketGlow = this.add.ellipse(W / 2, H - 60, 100, 18, 0x4a90d9, 0.3);
          this.basketGlow.setDepth(19);

          // Touch controls
          this.input.on('pointermove', function(pointer) {
            if (!this.gameOver) {
              this.pointerX = Phaser.Math.Clamp(pointer.x, 60, W - 60);
            }
          }, this);

          this.input.on('pointerdown', function(pointer) {
            if (!this.gameOver) {
              this.pointerX = Phaser.Math.Clamp(pointer.x, 60, W - 60);
              this.hideTutorial();
            }
          }, this);

          // Spawn timer (slower pace)
          this.spawnDelay = 1600;
          this.spawnTimer = this.time.addEvent({
            delay: this.spawnDelay,
            callback: this.spawnItem,
            callbackScope: this,
            loop: true
          });

          // Spawn first item quickly
          this.time.delayedCall(400, this.spawnItem, [], this);

          // Tutorial hand
          this.showTutorial();

          // Pulsing warning
          this.tweens.add({
            targets: this.warningText,
            alpha: 0.4,
            duration: 600,
            yoyo: true,
            repeat: -1
          });
        }

        createVignette() {
          var vg = this.add.graphics();
          vg.setDepth(5);
          vg.fillStyle(0x000000, 0.0);
          vg.fillRect(0, 0, W, H);

          // Top/bottom gradients for depth
          for (var i = 0; i < 40; i++) {
            var a = (1 - i / 40) * 0.3;
            vg.fillStyle(0x000000, a);
            vg.fillRect(0, i * 2, W, 2);
            vg.fillRect(0, H - i * 2 - 2, W, 2);
          }
        }

        createFireParticles() {
          // Left edge fire
          this.fireLeft = this.add.particles(0, 0, 'fire_particle', {
            x: { min: -5, max: 15 },
            y: { min: 0, max: H },
            lifespan: { min: 400, max: 1000 },
            speed: { min: 20, max: 60 },
            angle: { min: -30, max: 30 },
            scale: { start: 0.5, end: 0 },
            alpha: { start: 0.8, end: 0 },
            tint: [0xff4400, 0xff6600, 0xff8800, 0xffaa00, 0xff2200],
            frequency: 60,
            blendMode: 'ADD',
            emitting: true
          });
          this.fireLeft.setDepth(6);

          // Right edge fire
          this.fireRight = this.add.particles(0, 0, 'fire_particle', {
            x: { min: W - 15, max: W + 5 },
            y: { min: 0, max: H },
            lifespan: { min: 400, max: 1000 },
            speed: { min: 20, max: 60 },
            angle: { min: 150, max: 210 },
            scale: { start: 0.5, end: 0 },
            alpha: { start: 0.8, end: 0 },
            tint: [0xff4400, 0xff6600, 0xff8800, 0xffaa00, 0xff2200],
            frequency: 60,
            blendMode: 'ADD',
            emitting: true
          });
          this.fireRight.setDepth(6);

          // Top edge fire
          this.fireTop = this.add.particles(0, 0, 'fire_particle', {
            x: { min: 0, max: W },
            y: { min: -5, max: 15 },
            lifespan: { min: 400, max: 800 },
            speed: { min: 20, max: 50 },
            angle: { min: 60, max: 120 },
            scale: { start: 0.4, end: 0 },
            alpha: { start: 0.7, end: 0 },
            tint: [0xff4400, 0xff6600, 0xff8800, 0xffaa00],
            frequency: 40,
            blendMode: 'ADD',
            emitting: true
          });
          this.fireTop.setDepth(6);

          // Bottom edge fire
          this.fireBottom = this.add.particles(0, 0, 'fire_particle', {
            x: { min: 0, max: W },
            y: { min: H - 15, max: H + 5 },
            lifespan: { min: 300, max: 700 },
            speed: { min: 20, max: 50 },
            angle: { min: -120, max: -60 },
            scale: { start: 0.4, end: 0 },
            alpha: { start: 0.6, end: 0 },
            tint: [0xff4400, 0xff6600, 0xff8800],
            frequency: 40,
            blendMode: 'ADD',
            emitting: true
          });
          this.fireBottom.setDepth(6);
        }

        showTutorial() {
          this.hand = this.add.image(W / 2, H - 170, 'hand');
          this.hand.setDepth(50).setAlpha(0.9).setScale(1.2);

          this.tutorialText = this.add.text(W / 2, H - 220, '👆 Swipe to catch junk!', {
            fontFamily: 'Arial, Helvetica, sans-serif',
            fontSize: '18px',
            fontStyle: 'bold',
            color: '#ffffff',
            stroke: '#000000',
            strokeThickness: 3
          }).setOrigin(0.5).setDepth(50);

          this.tweens.add({
            targets: this.hand,
            x: W / 2 + 80,
            duration: 600,
            yoyo: true,
            repeat: -1,
            ease: 'Sine.easeInOut'
          });

          this.tweens.add({
            targets: this.tutorialText,
            alpha: 0.5,
            duration: 800,
            yoyo: true,
            repeat: -1
          });
        }

        hideTutorial() {
          if (this.hand && this.hand.visible) {
            this.tweens.add({
              targets: [this.hand, this.tutorialText],
              alpha: 0,
              duration: 300,
              onComplete: function() {
                if (this.hand) this.hand.setVisible(false);
                if (this.tutorialText) this.tutorialText.setVisible(false);
              },
              callbackScope: this
            });
          }
        }

        spawnItem() {
          if (this.gameOver) return;

          var typeIdx = Phaser.Math.Between(0, ITEM_TYPES.length - 1);
          var type = ITEM_TYPES[typeIdx];
          var x = Phaser.Math.Between(50, W - 50);

          var container = this.add.container(x, -80);
          container.setDepth(15);

          var icon = this.add.image(0, 0, 'item_' + typeIdx);
          container.add(icon);

          var emojiText = this.add.text(0, -8, type.emoji, {
            fontSize: '32px'
          }).setOrigin(0.5);
          container.add(emojiText);

          var labelText = this.add.text(0, 24, type.label, {
            fontFamily: 'Arial, Helvetica, sans-serif',
            fontSize: '12px',
            fontStyle: 'bold',
            color: '#ffffff',
            stroke: '#000000',
            strokeThickness: 2
          }).setOrigin(0.5);
          container.add(labelText);

          var gbLabel = this.add.text(0, 50, type.gb + ' GB', {
            fontFamily: 'Arial, Helvetica, sans-serif',
            fontSize: '14px',
            fontStyle: 'bold',
            color: '#ffdd44',
            stroke: '#000000',
            strokeThickness: 2
          }).setOrigin(0.5);
          container.add(gbLabel);

          container.itemType = type;
          container.itemRadius = 40;

          // Slight wobble
          this.tweens.add({
            targets: container,
            angle: { from: -8, to: 8 },
            duration: Phaser.Math.Between(400, 700),
            yoyo: true,
            repeat: -1,
            ease: 'Sine.easeInOut'
          });

          // Slow falling — easy to catch
          var fallSpeed = 3800 - this.collected * 80;
          fallSpeed = Math.max(fallSpeed, 2400);

          this.tweens.add({
            targets: container,
            y: H + 80,
            duration: fallSpeed,
            ease: 'Quad.easeIn',
            onComplete: function() {
              this.removeItem(container, false);
            },
            callbackScope: this
          });

          this.itemsOnScreen.push(container);

          // Speed up spawning slightly
          if (this.collected > 3 && this.spawnDelay > 1000) {
            this.spawnDelay -= 40;
            this.spawnTimer.delay = this.spawnDelay;
          }
        }

        removeItem(container, caught) {
          var idx = this.itemsOnScreen.indexOf(container);
          if (idx !== -1) this.itemsOnScreen.splice(idx, 1);
          if (!caught) {
            container.destroy();
          }
        }

        collectItem(container) {
          this.collected++;
          this.gbRemoved += container.itemType.gb;
          var currentGB = Math.max(0, MAX_GB - this.gbRemoved);

          this.removeItem(container, true);

          // Collection burst effect
          var burst = this.add.particles(container.x, container.y, 'spark', {
            speed: { min: 80, max: 200 },
            angle: { min: 0, max: 360 },
            scale: { start: 0.8, end: 0 },
            alpha: { start: 1, end: 0 },
            lifespan: 500,
            quantity: 12,
            tint: [0x00ff88, 0x44ffaa, 0xffffff, 0x88ffcc],
            blendMode: 'ADD',
            emitting: false
          });
          burst.explode(12);
          burst.setDepth(25);
          this.time.delayedCall(600, function() { burst.destroy(); });

          // Floating text
          var floatText = this.add.text(container.x, container.y, '-' + container.itemType.gb + 'GB ✓', {
            fontFamily: 'Arial, Helvetica, sans-serif',
            fontSize: '22px',
            fontStyle: 'bold',
            color: '#00ff88',
            stroke: '#000000',
            strokeThickness: 3
          }).setOrigin(0.5).setDepth(30);

          this.tweens.add({
            targets: floatText,
            y: container.y - 80,
            alpha: 0,
            scale: 1.3,
            duration: 800,
            ease: 'Cubic.easeOut',
            onComplete: function() { floatText.destroy(); }
          });

          container.destroy();

          // Update GB display with bounce
          this.gbText.setText(currentGB + ' GB');
          this.tweens.add({
            targets: this.gbText,
            scale: 1.3,
            duration: 120,
            yoyo: true,
            ease: 'Back.easeOut'
          });

          // Update storage bar (decreases — junk is being removed)
          var progress = Math.min(this.collected / ITEMS_TO_COLLECT, 1);
          var remainingRatio = Math.max(0, 1 - progress);
          var barWidth = this.storageBarWidth * remainingRatio;
          this.tweens.add({
            targets: this.progressFill,
            width: Math.max(0, barWidth),
            duration: 400,
            ease: 'Cubic.easeOut'
          });

          // Update bar color: red -> yellow -> green as storage frees up
          var barColor;
          if (remainingRatio > 0.6) barColor = 0xff4444;
          else if (remainingRatio > 0.3) barColor = 0xffaa22;
          else barColor = 0x44cc44;
          this.progressFill.setFillStyle(barColor, 1);

          // Update storage label
          this.storageLabel.setText(currentGB + ' GB / ' + MAX_GB + ' GB');

          // Transition background color: red -> green
          this.updateBackground(progress);

          // Reduce fire intensity
          this.updateFireIntensity(1 - progress);

          // Update UI colors
          if (progress > 0.5) {
            this.gbBg.setStrokeStyle(2, 0x44ff88, 0.8);
            this.gbLabel.setColor('#88ffaa');
            this.gbLabel.setText('CLEANING...');
            this.warningText.setText('Keep cleaning!');
            this.warningText.setColor('#44ff88');
          }

          // Check win
          if (this.collected >= ITEMS_TO_COLLECT) {
            this.winGame(currentGB);
          }
        }

        updateBackground(progress) {
          // Interpolate from red (200,30,30) to green (20,140,40)
          var r = Math.round(Phaser.Math.Linear(200, 20, progress));
          var g = Math.round(Phaser.Math.Linear(30, 140, progress));
          var b = Math.round(Phaser.Math.Linear(30, 40, progress));

          this.bgColor = { r: r, g: g, b: b };
          var hex = (r << 16) | (g << 8) | b;
          this.cameras.main.setBackgroundColor(hex);
        }

        updateFireIntensity(intensity) {
          var freq = Math.max(200, Math.round(60 / Math.max(intensity, 0.05)));
          var alpha = intensity;

          if (intensity <= 0.1) {
            this.fireLeft.stop();
            this.fireRight.stop();
            this.fireTop.stop();
            this.fireBottom.stop();
          } else {
            this.fireLeft.setFrequency(freq);
            this.fireRight.setFrequency(freq);
            this.fireTop.setFrequency(freq);
            this.fireBottom.setFrequency(freq);
          }
        }

        winGame(remainingGB) {
          this.gameOver = true;

          // Stop spawning
          this.spawnTimer.remove(false);

          // Destroy remaining items
          for (var i = 0; i < this.itemsOnScreen.length; i++) {
            this.itemsOnScreen[i].destroy();
          }
          this.itemsOnScreen = [];

          // Celebration particles
          this.add.particles(W / 2, H / 2, 'spark', {
            speed: { min: 100, max: 300 },
            angle: { min: 0, max: 360 },
            scale: { start: 0.6, end: 0 },
            alpha: { start: 1, end: 0 },
            lifespan: 1200,
            quantity: 2,
            tint: [0x00ff88, 0x44ffaa, 0xffffff, 0x88ffcc, 0x00ccff],
            blendMode: 'ADD',
            frequency: 50,
            emitting: true
          }).setDepth(35);

          // Transition to CTA
          this.time.delayedCall(1200, function() {
            this.scene.start('CTA', { gbRemoved: this.gbRemoved, remainingGB: remainingGB });
          }, [], this);
        }

        update() {
          if (this.gameOver) return;

          // Smooth basket movement towards pointer
          var targetX = this.pointerX;
          var dx = targetX - this.basket.x;
          this.basket.x += dx * 0.15;
          this.basketGlow.x = this.basket.x;

          // Slight tilt based on movement
          this.basket.angle = Phaser.Math.Clamp(dx * 0.3, -15, 15);

          // Check collisions
          for (var i = this.itemsOnScreen.length - 1; i >= 0; i--) {
            var item = this.itemsOnScreen[i];
            if (!item || !item.active) continue;

            var dist = Phaser.Math.Distance.Between(
              this.basket.x, this.basket.y - 20,
              item.x, item.y
            );

            if (dist < 80) {
              this.collectItem(item);
              break;
            }
          }
        }
      }

      /* ==============================
         CTA SCENE
         ============================== */
      class CTAScene extends Phaser.Scene {
        constructor() { super('CTA'); }

        create(data) {
          W = this.scale.width;
          H = this.scale.height;

          // Green background
          this.cameras.main.setBackgroundColor('#0d8c2a');

          // Celebration particles
          this.add.particles(W / 2, 0, 'spark', {
            x: { min: 0, max: W },
            y: { min: -10, max: 10 },
            speed: { min: 30, max: 80 },
            angle: { min: 70, max: 110 },
            scale: { start: 0.4, end: 0 },
            alpha: { start: 0.8, end: 0 },
            lifespan: 2000,
            tint: [0x44ff88, 0x88ffcc, 0xffffff, 0x00ccff],
            blendMode: 'ADD',
            frequency: 100
          }).setDepth(1);

          // Checkmark circle
          var checkBg = this.add.circle(W / 2, H * 0.22, 55, 0x00e676, 1);
          checkBg.setStrokeStyle(4, 0xffffff, 0.5).setDepth(10);
          checkBg.setAlpha(0).setScale(0.3);

          var checkMark = this.add.text(W / 2, H * 0.22, '✓', {
            fontFamily: 'Arial, Helvetica, sans-serif',
            fontSize: '60px',
            fontStyle: 'bold',
            color: '#ffffff'
          }).setOrigin(0.5).setDepth(11);
          checkMark.setAlpha(0).setScale(0.3);

          // Animate check in
          this.tweens.add({
            targets: [checkBg, checkMark],
            alpha: 1,
            scale: 1,
            duration: 500,
            ease: 'Back.easeOut',
            delay: 200
          });

          // Title
          var title = this.add.text(W / 2, H * 0.36, 'Phone Cleaned!', {
            fontFamily: 'Arial, Helvetica, sans-serif',
            fontSize: '32px',
            fontStyle: 'bold',
            color: '#ffffff',
            stroke: '#000000',
            strokeThickness: 2
          }).setOrigin(0.5).setDepth(10);
          title.setAlpha(0);

          this.tweens.add({
            targets: title,
            alpha: 1,
            y: H * 0.34,
            duration: 500,
            ease: 'Cubic.easeOut',
            delay: 500
          });

          // Stats
          var gbRemoved = data.gbRemoved || 0;
          var statsText = this.add.text(W / 2, H * 0.43, gbRemoved + ' GB Freed!', {
            fontFamily: 'Arial, Helvetica, sans-serif',
            fontSize: '22px',
            fontStyle: 'bold',
            color: '#aaffcc'
          }).setOrigin(0.5).setDepth(10);
          statsText.setAlpha(0);

          this.tweens.add({
            targets: statsText,
            alpha: 1,
            duration: 500,
            delay: 700
          });

          // Benefits list
          var benefits = [
            '⚡  Faster Phone',
            '🔋  Better Battery',
            '💾  More Storage',
            '🛡️  Protected Privacy'
          ];
          var startY = H * 0.52;
          for (var i = 0; i < benefits.length; i++) {
            var b = this.add.text(W / 2, startY + i * 38, benefits[i], {
              fontFamily: 'Arial, Helvetica, sans-serif',
              fontSize: '17px',
              color: '#ffffff',
              stroke: '#000000',
              strokeThickness: 1
            }).setOrigin(0.5).setDepth(10);
            b.setAlpha(0);

            this.tweens.add({
              targets: b,
              alpha: 1,
              x: { from: W / 2 + 40, to: W / 2 },
              duration: 400,
              ease: 'Cubic.easeOut',
              delay: 900 + i * 150
            });
          }

          // CTA Button
          var btnY = H * 0.82;
          var ctaBtn = this.add.image(W / 2, btnY, 'cta_btn').setDepth(20);
          ctaBtn.setAlpha(0).setScale(0.8);
          ctaBtn.setInteractive({ useHandCursor: true });

          var ctaBtnText = this.add.text(W / 2, btnY - 3, 'INSTALL FREE', {
            fontFamily: 'Arial, Helvetica, sans-serif',
            fontSize: '24px',
            fontStyle: 'bold',
            color: '#ffffff',
            stroke: '#006622',
            strokeThickness: 2
          }).setOrigin(0.5).setDepth(21);
          ctaBtnText.setAlpha(0);

          // Animate button in
          this.tweens.add({
            targets: [ctaBtn, ctaBtnText],
            alpha: 1,
            scale: 1,
            duration: 600,
            ease: 'Back.easeOut',
            delay: 1600
          });

          // Button pulse
          this.tweens.add({
            targets: ctaBtn,
            scaleX: 1.06,
            scaleY: 1.06,
            duration: 800,
            yoyo: true,
            repeat: -1,
            ease: 'Sine.easeInOut',
            delay: 2200
          });

          // Button glow
          var btnGlow = this.add.ellipse(W / 2, btnY + 30, 280, 30, 0x00ff88, 0.2);
          btnGlow.setDepth(19);
          this.tweens.add({
            targets: btnGlow,
            alpha: 0.05,
            scaleX: 1.2,
            duration: 1000,
            yoyo: true,
            repeat: -1,
            delay: 2200
          });

          // Click handler
          ctaBtn.on('pointerdown', function() {
            // Scale feedback
            this.tweens.add({
              targets: [ctaBtn, ctaBtnText],
              scale: 0.92,
              duration: 80,
              yoyo: true,
              onComplete: function() {
                if (typeof window.clickInstall === 'function') {
                  window.clickInstall();
                }
              }
            });
          }, this);

          // Tap anywhere text
          var tapText = this.add.text(W / 2, H * 0.92, 'Clean your phone for real!', {
            fontFamily: 'Arial, Helvetica, sans-serif',
            fontSize: '13px',
            color: '#aaffcc',
            fontStyle: 'italic'
          }).setOrigin(0.5).setDepth(10);
          tapText.setAlpha(0);

          this.tweens.add({
            targets: tapText,
            alpha: 0.8,
            duration: 500,
            delay: 2400
          });

          // Whole-screen tap to install (after delay)
          this.time.delayedCall(2500, function() {
            this.input.on('pointerdown', function(pointer) {
              // Only if not on the button itself
              if (typeof window.clickInstall === 'function') {
                window.clickInstall();
              }
            });
          }, [], this);
        }
      }

      /* ==============================
         PHASER CONFIG
         ============================== */
      var dpr = Math.min(window.devicePixelRatio || 1, 3);
      var config = {
        type: Phaser.CANVAS,
        parent: 'game-container',
        width: 400,
        height: 720,
        backgroundColor: '#c81e1e',
        transparent: false,
        banner: false,
        resolution: dpr,
        scale: {
          mode: Phaser.Scale.FIT,
          autoCenter: Phaser.Scale.CENTER_BOTH
        },
        scene: [BootScene, GameScene, CTAScene],
        input: {
          activePointers: 1
        },
        render: {
          antialias: true,
          pixelArt: false,
          roundPixels: false
        }
      };

      new Phaser.Game(config);
    };
    </script>
  </body>
</html>
